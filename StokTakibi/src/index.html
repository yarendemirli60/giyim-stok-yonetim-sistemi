<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Meral Giyim</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<main class="page">

  <header class="hero">
    <div>
      <span class="label">Giyim Mağazası</span>

      <h1>Meral Giyim</h1>

    </div>
  </header>

  <section class="stats">

    <div class="stat-card">
      <span>Toplam Ürün</span>
      <h2 id="totalProducts">0</h2>
    </div>

    <div class="stat-card warning">
      <span>Düşük Stok</span>
      <h2 id="lowStockProducts">0</h2>
    </div>

    <div class="stat-card danger">
      <span>Stokta Yok</span>
      <h2 id="outOfStockProducts">0</h2>
    </div>

    <div class="stat-card success">
      <span>Toplam Stok</span>
      <h2 id="totalStockValue">0</h2>
    </div>

  </section>

  <section class="toolbar">

    <input
      type="text"
      id="searchInput"
      placeholder="Ürün ara..."
    />

    <select id="categoryFilter">

      <option value="">Tüm Kategoriler</option>

      <option value="Tişört">Tişört</option>
      <option value="Gömlek">Gömlek</option>
      <option value="Pantolon">Pantolon</option>
      <option value="Jean">Jean</option>
      <option value="Şort">Şort</option>
      <option value="Eşofman">Eşofman</option>
      <option value="Sweatshirt">Sweatshirt</option>
      <option value="Kazak">Kazak</option>
      <option value="Hırka">Hırka</option>
      <option value="Ceket">Ceket</option>
      <option value="Mont">Mont</option>
      <option value="Trençkot">Trençkot</option>
      <option value="Yağmurluk">Yağmurluk</option>
      <option value="Yelek">Yelek</option>
      <option value="Etek">Etek</option>
      <option value="Elbise">Elbise</option>
      <option value="Takım Elbise">Takım Elbise</option>
      <option value="Tayt">Tayt</option>
      <option value="Bluz">Bluz</option>
      <option value="Atlet">Atlet</option>
      <option value="Pijama">Pijama</option>
      <option value="İç Giyim">İç Giyim</option>

    </select>

    <select id="stockFilter">

      <option value="">Tüm Stok Durumları</option>

      <option value="normal">Stokta Var</option>
      <option value="low">Düşük Stok</option>
      <option value="out">Stokta Yok</option>

    </select>

  </section>

  <section class="table-section">

    <div class="table-header">

      <div>
        <h2>Ürün Listesi</h2>
      </div>

    </div>

    <div class="table-wrapper">

      <table>

        <thead>

          <tr>
            <th>ID</th>
            <th>Ürün</th>
            <th>Kategori</th>
            <th>Beden</th>
            <th>Renk</th>
            <th>Fiyat</th>
            <th>Stok</th>
            <th>Durum</th>
            <th>İşlem</th>
          </tr>

        </thead>

        <tbody id="productList"></tbody>

      </table>

    </div>

  </section>

  <section class="operation-card">

    <div class="form-box">

      <h2>Ürün Ekle / Güncelle</h2>

      <p class="sale-text">
        Yeni ürün ekleyebilir veya mevcut ürünleri güncelleyebilirsiniz.
      </p>

      <form id="addProductForm">

        <input
          type="text"
          id="addName"
          placeholder="Ürün adı"
        />

        <select id="addCategory">

          <option value="">Kategori seç</option>

          <option value="Tişört">Tişört</option>
          <option value="Gömlek">Gömlek</option>
          <option value="Pantolon">Pantolon</option>
          <option value="Jean">Jean</option>
          <option value="Şort">Şort</option>
          <option value="Eşofman">Eşofman</option>
          <option value="Sweatshirt">Sweatshirt</option>
          <option value="Kazak">Kazak</option>
          <option value="Hırka">Hırka</option>
          <option value="Ceket">Ceket</option>
          <option value="Mont">Mont</option>
          <option value="Trençkot">Trençkot</option>
          <option value="Yağmurluk">Yağmurluk</option>
          <option value="Yelek">Yelek</option>
          <option value="Etek">Etek</option>
          <option value="Elbise">Elbise</option>
          <option value="Takım Elbise">Takım Elbise</option>
          <option value="Tayt">Tayt</option>
          <option value="Bluz">Bluz</option>
          <option value="Atlet">Atlet</option>
          <option value="Pijama">Pijama</option>
          <option value="İç Giyim">İç Giyim</option>

        </select>

        <input
          type="text"
          id="addSize"
          placeholder="Beden"
        />

        <input
          type="text"
          id="addColor"
          placeholder="Renk"
        />

        <input
          type="text"
          id="addSeason"
          placeholder="Sezon"
        />

        <input
          type="number"
          id="addPrice"
          placeholder="Fiyat"
        />

        <input
          type="number"
          id="addStock"
          placeholder="Stok"
        />

        <input
          type="number"
          id="addMinStock"
          placeholder="Minimum stok"
        />

        <button
          type="submit"
          class="main-btn"
          id="submitButton"
        >
          Kaydet
        </button>

      </form>

    </div>

  </section>

</main>

<div id="toast" class="toast"></div>

<script src="js/api.js"></script>
<script src="js/validation.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
